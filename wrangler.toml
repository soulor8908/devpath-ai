# wrangler.toml
# Cloudflare Pages 配置
# 部署：npx wrangler pages deploy .vercel/output/static --project-name=devpath-ai

name = "devpath-ai"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

[[kv_namespaces]]
binding = "KV"
id = "086d793456e5425bacb04836da93ad9b"
# 预览环境使用独立 namespace，避免污染生产数据
preview_id = "preview-kv-namespace-placeholder"

# apiKey Session 安全架构专用 namespace
[[kv_namespaces]]
binding = "AUTH_SESSIONS"
id = "ff753a3ce9664d93a79f2e25c36f3433"

[[kv_namespaces]]
binding = "AUTH_NONCES"
id = "02684817b6884df4a1eb48416426cf07"

[[kv_namespaces]]
binding = "AUTH_AUDIT"
id = "31f90bc37a644f55902e1a8b4ebce13f"

# Workers AI binding（知识库向量化：/api/embed 调 bge-base-en-v1.5 嵌入查询文本）
# 注意：@cloudflare/next-on-pages 通过 getRequestContext().env.AI 读取，
# 此声明让 wrangler 在本地 dev 和 Pages 部署时注入 AI binding。
# 写法注意：wrangler 4.x 要求 [ai]（对象形式），不是 [[ai]]（数组形式），
# 否则报 "The field 'ai' should be an object but got [...]"
[ai]
binding = "AI"

[vars]
AI_PROVIDER = "deepseek"
# 以下密钥通过 `wrangler pages secret put <NAME> --project-name=devpath-ai` 上传：
# - MASTER_KEY        : 加密会话根密钥（32 字节 base64，必须配置，openssl rand -base64 32 生成）
# - DEEPSEEK_API_KEY : DeepSeek API Key
# - GLM_API_KEY       : 智谱 GLM API Key（如使用 glm provider）
